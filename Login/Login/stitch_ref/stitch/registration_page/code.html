<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Premium SaaS - Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00f2ff",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2223",
                        "glass-border": "rgba(0, 242, 255, 0.2)",
                        "glass-bg": "rgba(15, 34, 35, 0.7)",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(15, 34, 35, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 242, 255, 0.15);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
        }
        .floating-label-input:focus ~ label,
        .floating-label-input:not(:placeholder-shown) ~ label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #00f2ff;
        }
        .password-strength-bar {
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="font-display bg-background-dark text-slate-100 min-h-screen selection:bg-primary/30">
<div class="fixed inset-0 -z-10 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-primary/10 via-background-dark to-background-dark"></div>
<div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_bottom_left,_var(--tw-gradient-stops))] from-primary/5 via-transparent to-transparent"></div>
<div class="layout-container flex min-h-screen flex-col">
<header class="flex items-center justify-between px-6 py-6 lg:px-20">
<div class="flex items-center gap-3">
<div class="size-10 bg-primary/10 rounded-lg flex items-center justify-center border border-primary/20">
<svg class="text-primary size-6" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-slate-100 text-xl font-black tracking-tight uppercase">Nexus<span class="text-primary">Core</span></h2>
</div>
<a class="text-slate-400 hover:text-primary text-sm font-medium transition-colors" href="#">Support</a>
</header>
<main class="flex-1 flex items-center justify-center px-4 py-12">
<div class="w-full max-w-[500px]">
<div class="glass-panel rounded-xl p-8 lg:p-10 shadow-2xl relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
<div class="mb-8">
<h1 class="text-3xl font-bold text-white mb-2">Create Account</h1>
<p class="text-slate-400 text-sm">Join the next generation of enterprise SaaS.</p>
</div>
<form class="space-y-6">
<div class="relative">
<input class="floating-label-input block w-full px-4 h-14 bg-white/5 border border-primary/10 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-primary/50 focus:border-primary/50 transition-all peer" id="name" placeholder=" " type="text"/>
<label class="absolute left-4 top-4 text-slate-400 pointer-events-none transition-all duration-200" for="name">Full Name</label>
</div>
<div class="relative">
<input class="floating-label-input block w-full px-4 h-14 bg-white/5 border border-primary/10 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-primary/50 focus:border-primary/50 transition-all peer" id="email" placeholder=" " type="email"/>
<label class="absolute left-4 top-4 text-slate-400 pointer-events-none transition-all duration-200" for="email">Work Email Address</label>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="relative">
<input class="floating-label-input block w-full px-4 h-14 bg-white/5 border border-primary/10 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-primary/50 focus:border-primary/50 transition-all peer" id="password" placeholder=" " type="password"/>
<label class="absolute left-4 top-4 text-slate-400 pointer-events-none transition-all duration-200 text-sm" for="password">Password</label>
</div>
<div class="relative">
<input class="floating-label-input block w-full px-4 h-14 bg-white/5 border border-primary/10 rounded-lg text-white focus:outline-none focus:ring-1 focus:ring-primary/50 focus:border-primary/50 transition-all peer" id="confirm_password" placeholder=" " type="password"/>
<label class="absolute left-4 top-4 text-slate-400 pointer-events-none transition-all duration-200 text-sm" for="confirm_password">Confirm</label>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between text-[10px] uppercase tracking-widest font-bold text-slate-500">
<span>Password Strength</span>
<span class="text-primary">Strong</span>
</div>
<div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
<div class="password-strength-bar h-full bg-primary neon-glow" style="width: 75%"></div>
</div>
</div>
<div class="pt-4 border-t border-primary/10">
<div class="flex items-center justify-between mb-4">
<p class="text-sm font-medium text-slate-300">Identity Verification</p>
<button class="text-xs text-primary hover:underline flex items-center gap-1 group" type="button">
                                    Send OTP 
                                    <span class="material-symbols-outlined text-sm">send</span>
</button>
</div>
<div class="flex justify-between gap-2">
<input class="w-12 h-12 text-center text-xl font-bold bg-white/5 border border-primary/20 rounded-lg text-primary focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" type="text" value="4"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-white/5 border border-primary/20 rounded-lg text-primary focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" type="text" value="8"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-white/5 border border-primary/20 rounded-lg text-primary focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" type="text" value="2"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-white/5 border border-primary/20 rounded-lg text-primary focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-white/5 border border-primary/20 rounded-lg text-primary focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-12 text-center text-xl font-bold bg-white/5 border border-primary/20 rounded-lg text-primary focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
</div>
<div class="mt-3 flex items-center gap-2">
<div class="h-1 flex-1 bg-white/5 rounded-full overflow-hidden">
<div class="h-full bg-primary/40" style="width: 45%"></div>
</div>
<span class="text-[10px] text-slate-500 uppercase">Verifying...</span>
</div>
</div>
<button class="w-full h-14 bg-primary text-background-dark font-bold rounded-lg shadow-[0_0_20px_rgba(0,242,255,0.3)] hover:shadow-[0_0_30px_rgba(0,242,255,0.5)] hover:-translate-y-0.5 transition-all active:scale-95 flex items-center justify-center gap-2" type="submit">
<span>Initialize Registration</span>
<span class="material-symbols-outlined">bolt</span>
</button>
</form>
<div class="mt-8 text-center">
<p class="text-slate-400 text-sm">
                            Already have an account? 
                            <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 ml-1" href="#">Log in</a>
</p>
</div>

</div>
</div>
<div class="mt-8 flex flex-wrap justify-center gap-x-8 gap-y-2 text-[10px] uppercase tracking-[0.2em] text-slate-600 font-bold">
<a class="hover:text-primary transition-colors" href="#">Privacy Protocol</a>
<a class="hover:text-primary transition-colors" href="#">Service Terms</a>
<a class="hover:text-primary transition-colors" href="#">Compliance</a>
</div>
</div>
</main>
<footer class="px-6 py-8 text-center">
<p class="text-slate-600 text-xs">© 2024 NexusCore Technologies. Systems active and secured.</p>
</footer>
</div>
<div class="fixed top-1/4 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>

</body></html>
